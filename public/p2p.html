<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/gpt-css/common.css">
  <title>개인통화</title>
</head>
<body>

  <div id="show-room-password">방 코드와 비밀번호 확인<br></div>

  <label id="mediapipe-control">
    <input type="checkbox" id="mediapipe-toggle">
    MediaPipe pose skeleton
  </label>

  <div id="local-container">
    <h3>내<span id="local-nickname"></span> 화면</h3>
    <video id="local-video" autoplay playsinline muted></video>
  </div>
  <div id="remote-container">
    <h3>상대<span id="remote-nickname"></span>의 화면</h3>
    <video id="remote-video" autoplay playsinline></video>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/js/pages/p2pPage.js"></script>
</body>
</html>
