<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/gpt-css/common.css">
  <title>대기화면</title>
</head>
<body>
  <header> <!-- column flex 예정 -->
    <div id="logo-box">
      <img id="logo" src="/images/logo.png" alt="logo" style="width: 250px"/>
    </div>
    <button onclick="">내 미디어 확인하기<br>[작업전]</button>
    <div class="alarm">
      <button onclick="">알람<br>[작업전]</button>
      <h4></h4>
      <ul id="alarm-log">
        <!-- 개발 로깅용 공간 -->
      </ul>
    </div>
    <button id="logout" onclick="">로그아웃</button>
  </header>
  
  <div class="userinfo-conainer">
    <img id="user-profile-img" src="" alt="user-profile" />
    <div class="user-meta">
      <h1 id="title"></h1>
      <p id="user-email"></p>
    </div>
  </div>

  <div class="main-container">
    <div class="private-box">
      <h2>[P2P] RTCPeerConnection</h2>
      <button id="create-private">개인 통화방 생성하기</button>
      <button id="join-private">개인 통화방 참여하기</button>
    </div>
    <div class="group-box">
      <h2>[Group] mediasoup</h2>
      <button id="create-group">그룹 통화방 생성하기</button>
      <button id="join-group">그룹 통화방 참여하기</button>
    </div>
  </div>

  <div class="modal">
    <!-- 로그아웃 확인용 -->
    <!-- 방 생성용 (방 코드/비번 알려주기) -->
    <!-- 방 참여 (방 코드 입력하기) -->
  </div>
  
  <!-- [2026-07-11 12:43:29] socket.io 스크립트 가져와주기. dashboardPage.js 작업도중 필요해짐 -->
  <!-- module로 하지 않아도 자동 브라우저 전역 io 생성-->
  <script src="/socket.io/socket.io.js"></script>
  <!-- 사용자 토큰(로그인 상태)확인 및 소켓 연결해주기 -->
  <script type="module" src="/js/pages/dashboardPage.js"></script>
</body>
</html>
